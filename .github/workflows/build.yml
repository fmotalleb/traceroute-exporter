name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7 # v7.0.0

      - uses: actions/setup-go@v6 # v6.5.0
        with:
          go-version: '1.26'
          check-latest: true

      - name: Build
        run: make ci
        env:
          SKIP_DOCKER: ${{ (runner.os == 'macOS' || runner.os == 'Windows') }}
      - name: Upload coverage
        uses: actions/upload-artifact@v7 # v7.0.1
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.*

      - run: go tool goreleaser release --clean --snapshot
        if: ${{ runner.os == 'Linux' }}

      - name: Upload dist
        uses: actions/upload-artifact@v7 # v7.0.1
        with:
          name: dist-${{ matrix.os }}
          path: dist

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7 # v7.0.0
        with:
          fail_ci_if_error: true
          files: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

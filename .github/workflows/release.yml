name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  goreleaser:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6 # v6.5.0
        with:
          go-version: '1.26'
          check-latest: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: go tool goreleaser release 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dist
        uses: actions/upload-artifact@v7 # v7.0.1
        with:
          name: dist
          path: dist
